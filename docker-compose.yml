services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sdmastery-backend-app
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    command: >
      sh -lc "mkdir -p database && touch database/database.sqlite
      && if [ ! -f vendor/autoload.php ]; then composer install --no-interaction --prefer-dist; fi
      && php artisan migrate --force
      && php artisan serve --host=0.0.0.0 --port=8000"
    ports:
      - "8000:8000"
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      FRONTEND_URL: http://localhost:5174
      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/html/database/database.sqlite
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: null
    depends_on:
      redis:
        condition: service_healthy

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sdmastery-backend-queue
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    command: >
      sh -lc "mkdir -p database && touch database/database.sqlite
      && if [ ! -f vendor/autoload.php ]; then composer install --no-interaction --prefer-dist; fi
      && php artisan queue:work --tries=3 --sleep=1"
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/html/database/database.sqlite
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: null
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: sdmastery-backend-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
